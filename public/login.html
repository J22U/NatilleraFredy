<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Restringido - Natillera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: #ffffff;
            /* Quitamos el overflow hidden para que en celular se pueda hacer scroll si es necesario */
            overflow-x: hidden; 
        }

        .grid-bg {
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .linea-input {
            background: transparent;
            border: none;
            border-left: 2px solid #1f1f1f;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Ocultar el ojo nativo del navegador en campos de contraseña */
        .linea-input::-webkit-credentials-auto-fill-button {
            visibility: hidden;
            display: none !important;
            pointer-events: none;
            position: absolute;
            right: 0;
            width: 0 !important;
            height: 0 !important;
        }

        .linea-input::-webkit-credentials-auto-fill-button:hover,
        .linea-input::-webkit-credentials-auto-fill-button:focus {
            visibility: hidden;
            display: none !important;
        }

        /* Ocultar botón nativo de mostrar contraseña en Edge */
        .linea-input::-webkit-contacts-auto-fill-button,
        .linea-input::-webkit-credentials-auto-fill-button {
            visibility: hidden !important;
            pointer-events: none !important;
            position: absolute !important;
            width: 0 !important;
            height: 0 !important;
            opacity: 0 !important;
        }

        /* Para todos los navegadores modernos */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-webkit-contacts-auto-fill-button,
        input[type="password"]::-webkit-credentials-auto-fill-button {
            display: none !important;
            visibility: hidden !important;
            width: 0 !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .linea-input::-webkit-inner-spin-button,
        .linea-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .linea-input:focus {
            border-left: 2px solid #22d3ee;
            background: linear-gradient(90deg, rgba(34, 211, 238, 0.05) 0%, transparent 100%);
            padding-left: 1.5rem;
            outline: none;
        }

        /* Estilos para placeholders en cursiva y más pequeños */
        .linea-input::placeholder,
        .linea-input::-webkit-input-placeholder {
            font-style: italic;
            font-size: 0.875rem; /* text-sm */
            color: #525252;
            opacity: 1;
        }

        .linea-input::-moz-placeholder {
            font-style: italic;
            font-size: 0.875rem;
            color: #525252;
            opacity: 1;
        }

        .boton-ejecutar {
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }

        .boton-ejecutar:hover {
            background: #22d3ee;
            color: #000000;
        }

        .revelado {
            animation: subirRevelar 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes subirRevelar {
            0% { transform: translateY(40px); opacity: 0; filter: blur(10px); }
            100% { transform: translateY(0); opacity: 1; filter: blur(0); }
        }
    </style>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-10 lg:gap-16 items-center">
        
        <div class="lg:col-span-7 space-y-4 md:space-y-6 revelado text-center lg:text-left">
            <div class="flex items-center justify-center lg:justify-start gap-4 text-cyan-400">
                <span class="h-[1px] w-8 md:w-12 bg-cyan-400"></span>
                <span class="text-[8px] md:text-[10px] tracking-[0.4em] font-black uppercase">Seguridad</span>
            </div>
            
            <h1 class="text-6xl md:text-8xl lg:text-9xl font-black leading-[0.85] tracking-tighter">
                GESTIÓN <br> <span class="text-transparent" style="-webkit-text-stroke: 1px #444;">DE ACTIVOS</span>
            </h1>
            
            <p class="text-neutral-500 max-w-sm mx-auto lg:mx-0 text-base md:text-lg font-light leading-relaxed">
                Terminal de auditoría para el control. <br class="hidden md:block">
                <span class="text-neutral-400 font-medium italic">Acceso.</span>
            </p>
        </div>

        <div class="lg:col-span-5 bg-[#0a0a0a] border border-neutral-800 p-8 md:p-14 rounded-sm shadow-2xl revelado" style="animation-delay: 0.2s;">
            <form id="loginForm" class="space-y-8 md:space-y-10">
                
                <div class="group text-left">
                    <label class="block text-[9px] uppercase tracking-[0.2em] text-neutral-600 mb-2 group-focus-within:text-cyan-400 transition-colors">Usuario</label>
                    <input type="text" id="username" placeholder="Ingrese su usuario" required
                        class="w-full linea-input py-3 md:py-4 px-4 text-lg md:text-xl font-light">
                </div>

                <div class="group text-left">
                    <label class="block text-[9px] uppercase tracking-[0.em] text-neutral-600 mb-2 group-focus-within:text-cyan-400 transition-colors">Contraseña</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Ingrese su contraseña" required autocomplete="new-password"
                            class="w-full linea-input py-3 md:py-4 px-4 pr-12 text-lg md:text-xl font-light">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-neutral-500 hover:text-cyan-400 transition-colors cursor-pointer z-10">
                            <!-- Ojo tachado (por defecto) -->
                            <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                            <!-- Ojo abierto (oculto inicialmente) -->
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="boton-ejecutar w-full py-4 md:py-5 text-[10px] font-black tracking-[0.3em] uppercase">
                        Autorizar Ingreso
                    </button>
                    <div id="errorMsg" class="mt-4 text-[9px] text-center text-red-500 font-bold opacity-0 transition-opacity tracking-widest">
                        ERROR: ACCESO DENEGADO
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="fixed top-0 right-0 p-10 hidden lg:block">
        <div class="text-[10px] text-neutral-800 font-mono text-right">
            SISTEMA: ACTIVO<br>
            COLOMBIA: 2026
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
